name: "Frogbot Scan Repository"

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write
  security-events: write

jobs:
  scan-repository:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ["main"]
    steps:
      - uses: jfrog/frogbot@v2
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JF_GIT_BASE_BRANCH: ${{ matrix.branch }}
          # hermes_cli's setup.py imports itself before install (breaks pip's
          # build isolation), and the google-workspace OAuth helper script is
          # named setup.py but isn't a real package - both are real bugs in
          # those files, not scan/CI problems. Excluding until fixed upstream.
          JF_PATH_EXCLUSIONS: "*hermes_cli*;*google-workspace/scripts*;*tests/skills*"
          JF_SKIP_AUTOFIX: "true"
